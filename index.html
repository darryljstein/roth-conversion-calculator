<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fidelity Mutual Financial – Roth Planner V3.8.7</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { padding:20px; }
.header { background:#1f4e79; color:white; padding:20px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; }
.header img { height:50px; }

.card { background:white; padding:15px; margin-top:15px; border-radius:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }

input, select { width:100%; padding:6px; margin-top:5px; }

button { padding:10px; margin-top:10px; }

</style>
</head>

<body>

<div class="container">

<div class="header">
  <div>
    <h2>Fidelity Mutual Financial</h2>
    <div>V3.8.7 – IRMAA Age Gating + True Income Logic</div>
  </div>
  <img src="logo-white.png">
</div>

<div class="card grid">

<div>
<h3>Husband</h3>
Age <input id="hAge" value="62">
IRA <input id="hIRA" value="1000000">
Income <input id="hIncome" value="50000">
Taxable <input id="hTaxable" value="20000">
Income Ends Age <input id="hEnd" value="65">
SS Age <input id="hSSAge" value="65">
SS Annual <input id="hSS" value="37224">
</div>

<div>
<h3>Wife</h3>
Age <input id="wAge" value="56">
IRA <input id="wIRA" value="0">
Income <input id="wIncome" value="87000">
Taxable <input id="wTaxable" value="87000">
Income Ends Age <input id="wEnd" value="65">
SS Age <input id="wSSAge" value="65">
SS Annual <input id="wSS" value="24624">
</div>

</div>

<div class="card">
Desired Income <input id="income" value="115000">
Income Start Age <input id="startAge" value="65">
COLA % <input id="cola" value="3">
Target Bracket Top <input id="bracket" value="403550">
</div>

<div class="card">
<button onclick="run()">Run Analysis</button>
<h3 id="output"></h3>
</div>

</div>

<script>

function num(id){ return Number(document.getElementById(id).value)||0 }

function irmaa(magi, ageH, ageW){
  if(ageH < 65 && ageW < 65) return 0
  if(magi < 206000) return 0
  return 2434.8
}

function run(){

let hAge=num("hAge")
let wAge=num("wAge")

let hIncome=num("hIncome")
let wIncome=num("wIncome")

let hTax=num("hTaxable")
let wTax=num("wTaxable")

let hEnd=num("hEnd")
let wEnd=num("wEnd")

let hSSAge=num("hSSAge")
let wSSAge=num("wSSAge")

let hSS=num("hSS")
let wSS=num("wSS")

let desired=num("income")
let startAge=num("startAge")
let bracket=num("bracket")

let output=""

for(let y=0;y<5;y++){

let ageH=hAge+y
let ageW=wAge+y

let earned =
 (ageH<hEnd?hIncome:0) +
 (ageW<wEnd?wIncome:0)

let taxable =
 (ageH<hEnd?hTax:0) +
 (ageW<wEnd?wTax:0)

let ss =
 (ageH>=hSSAge?hSS:0) +
 (ageW>=wSSAge?wSS:0)

let incomeNeeded = (Math.max(ageH,ageW)>=startAge) ? desired : 0

let gap = Math.max(0, incomeNeeded - earned - ss)

let conversion = Math.max(0, bracket - taxable)

let magi = taxable + conversion + ss

let irm = irmaa(magi, ageH, ageW)

output += `
Year ${y+1} | Ages ${ageH}/${ageW}<br>
Earned: ${earned}<br>
SS: ${ss}<br>
Gap: ${gap}<br>
Conversion: ${conversion}<br>
IRMAA: ${irm}<br><br>
`

}

document.getElementById("output").innerHTML=output

}

</script>

</body>
</html>
