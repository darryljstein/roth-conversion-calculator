<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidelity Mutual Financial V3.8.1</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
.hero{background:#0b3a6f;color:#fff;padding:25px;border-radius:16px;margin:20px;}
.hero-flex{display:flex;justify-content:space-between;align-items:center;}
.hero-right img{height:90px;filter:brightness(2);}
.card{background:#fff;padding:20px;border-radius:16px;margin:20px;}
.spouse-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.spouse-col{border:1px solid #ddd;padding:15px;border-radius:12px;}
.field{margin-bottom:10px;}
</style>
</head>
<body>

<div class="hero">
<div class="hero-flex">
<div>
<h1>Fidelity Mutual Financial</h1>
<p>V3.8.1 Spouse Pension Split</p>
</div>
<div class="hero-right">
<img src="logo-white.png">
</div>
</div>
</div>

<div class="card">
<h2>Client Bio</h2>

<div class="spouse-layout">

<div class="spouse-col">
<h3>Husband</h3>
<div class="field">Age <input id="hAge" value="65"></div>
<div class="field">IRA <input id="hIra" value="2000000"></div>
<div class="field">Pension <input id="hPension" value="0"></div>
<div class="field">Pension Start Date <input id="hPensionStart" type="date"></div>
<div class="field">Pension COLA % <input id="hPensionCola" value="2.5"></div>
</div>

<div class="spouse-col">
<h3>Wife</h3>
<div class="field">Age <input id="wAge" value="62"></div>
<div class="field">IRA <input id="wIra" value="2000000"></div>
<div class="field">Pension <input id="wPension" value="0"></div>
<div class="field">Pension Start Date <input id="wPensionStart" type="date"></div>
<div class="field">Pension COLA % <input id="wPensionCola" value="2.5"></div>
</div>

</div>

</div>

</body>
</html>
