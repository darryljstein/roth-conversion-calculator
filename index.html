<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidelity Mutual Financial</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
.hero{background:#0b3a6f;color:#fff;padding:25px;border-radius:16px;margin:20px;}
.hero-flex{display:flex;justify-content:space-between;align-items:center;}
.hero-right img{height:90px;filter:brightness(2);}
.card{background:#fff;padding:20px;border-radius:16px;margin:20px;}
.spouse-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.spouse-col{border:1px solid #ddd;padding:15px;border-radius:12px;}
.field{margin-bottom:10px;}
</style>
</head>
<body>

<div class="hero">
<div class="hero-flex">
<div>
<h1>Fidelity Mutual Financial</h1>
<p>Tax Efficient Retirement Strategy</p>
</div>
<div class="hero-right">
<img src="logo-white.png">
</div>
</div>
</div>

<div class="card">
<h2>Client Bio</h2>

<div class="spouse-layout">

<div class="spouse-col">
<h3>Husband</h3>
<div class="field">Age <input value="65"></div>
<div class="field">IRA <input value="2000000"></div>
</div>

<div class="spouse-col">
<h3>Wife</h3>
<div class="field">Age <input value="62"></div>
<div class="field">IRA <input value="2000000"></div>
</div>

</div>
</div>

</body>
</html>
